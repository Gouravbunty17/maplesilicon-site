<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <clipPath id="arcTop">
      <rect x="10" y="0" width="100" height="46"/>
    </clipPath>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#41d5c2"/>
      <stop offset="100%" stop-color="#8de7ff"/>
    </linearGradient>
    <linearGradient id="shieldFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d2640"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Radar arcs (upper half only) -->
  <circle cx="60" cy="54" r="44"
          fill="none"
          stroke="url(#shieldGrad)"
          stroke-width="1.2"
          stroke-dasharray="8 5"
          opacity="0.55"
          clip-path="url(#arcTop)"/>
  <circle cx="60" cy="54" r="34"
          fill="none"
          stroke="url(#shieldGrad)"
          stroke-width="0.9"
          stroke-dasharray="5 4"
          opacity="0.35"
          clip-path="url(#arcTop)"/>

  <!-- Crosshair top (12 o'clock) -->
  <line x1="60" y1="8" x2="60" y2="18" stroke="#41d5c2" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>
  <line x1="54" y1="13" x2="66" y2="13" stroke="#41d5c2" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>

  <!-- Drone silhouette (upper-right of arc ~35°) -->
  <g transform="translate(90,26) scale(0.55)" filter="url(#glow)">
    <line x1="-10" y1="-3" x2="-22" y2="-11" stroke="#41d5c2" stroke-width="2" stroke-linecap="round"/>
    <line x1="10"  y1="-3" x2="22"  y2="-11" stroke="#41d5c2" stroke-width="2" stroke-linecap="round"/>
    <line x1="-10" y1="3"  x2="-22" y2="11"  stroke="#41d5c2" stroke-width="2" stroke-linecap="round"/>
    <line x1="10"  y1="3"  x2="22"  y2="11"  stroke="#41d5c2" stroke-width="2" stroke-linecap="round"/>
    <circle cx="-22" cy="-11" r="6" fill="none" stroke="#41d5c2" stroke-width="1.6"/>
    <circle cx="22"  cy="-11" r="6" fill="none" stroke="#41d5c2" stroke-width="1.6"/>
    <circle cx="-22" cy="11"  r="6" fill="none" stroke="#41d5c2" stroke-width="1.6"/>
    <circle cx="22"  cy="11"  r="6" fill="none" stroke="#41d5c2" stroke-width="1.6"/>
    <rect x="-9" y="-6" width="18" height="12" rx="3" fill="#41d5c2"/>
    <circle cx="0" cy="6" r="3.5" fill="#0d2640"/>
    <circle cx="0" cy="6" r="1.8" fill="#8de7ff" opacity="0.7"/>
  </g>

  <!-- Shield body -->
  <path d="M60,22 L96,22 L96,68 Q96,98 60,108 Q24,98 24,68 L24,22 Z"
        fill="url(#shieldFill)"
        stroke="url(#shieldGrad)"
        stroke-width="1.6"/>

  <!-- Shield inner highlight -->
  <path d="M60,27 L91,27 L91,67 Q91,94 60,103 Q29,94 29,67 L29,27 Z"
        fill="none"
        stroke="rgba(255,255,255,0.12)"
        stroke-width="1"/>

  <!-- Maple leaf (white, centered in shield) -->
  <g transform="translate(60,67) scale(0.62)">
    <path d="
      M 0,-46
      L 4.5,-32  L 17,-38  L 10,-23  L 29,-15  L 17,-7
      L 21,7    L 10,2.5  L 12,20
      L 0,14.5
      L -12,20  L -10,2.5 L -21,7   L -17,-7
      L -29,-15 L -10,-23 L -17,-38 L -4.5,-32 Z
    " fill="white" opacity="0.95"/>
    <rect x="-2.8" y="19" width="5.6" height="11" rx="1.2" fill="white" opacity="0.95"/>
  </g>

  <!-- Bottom scan line accent -->
  <line x1="36" y1="100" x2="84" y2="100" stroke="url(#shieldGrad)" stroke-width="0.8" opacity="0.4"/>
</svg>
